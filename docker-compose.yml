services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-comformation}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: /home/runner/work/comformation-system-app/comformation-system-app/backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@host.docker.internal:5432/comformation
      PORT: ${PORT:-3000}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    depends_on:
      - db
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '3000:3000'

  frontend:
    build:
      context: /home/runner/work/comformation-system-app/comformation-system-app/frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  postgres-data:
